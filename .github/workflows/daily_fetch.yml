name: Daily YouTube Trend Fetch

on:
  schedule:
    - cron: "0 10 * * *"   # Every day at 10 AM UTC
  workflow_dispatch:        # Allow manual runs from Actions tab

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    # Required so the Action can commit and push back to the repo
    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install google-api-python-client vaderSentiment pandas sqlalchemy python-dotenv matplotlib

      - name: Run pipeline
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python scripts/pipeline.py

      - name: Regenerate offline charts
        run: python scripts/generate_charts.py

      - name: Commit updated database and charts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/trends.db screenshots/ || true
          git diff --cached --quiet || git commit -m "data: daily trend fetch $(date -u '+%Y-%m-%d')"
          git push origin main
